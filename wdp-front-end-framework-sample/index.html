<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>WDP 前端工程示例</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background-color: #000; color: #fff; font-family: -apple-system, Microsoft YaHei, sans-serif; }
#player { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
#ui-panel { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.75); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); min-width: 280px; backdrop-filter: blur(8px); }
#ui-panel h3 { margin: 0 0 12px 0; font-size: 16px; color: #3498db; }
.info-section { margin-bottom: 12px; }
.info-section .label { font-size: 12px; color: #999; margin-bottom: 4px; }
.info-section .value { font-size: 13px; color: #eee; word-break: break-all; white-space: pre-wrap; }
.btn-action { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 14px; transition: background 0.2s; margin-top: 8px; }
.btn-action:disabled { background: #555; cursor: not-allowed; }
.btn-action:hover:not(:disabled) { background: #2980b9; }
.btn-action.secondary { background: #27ae60; }
.btn-action.secondary:hover:not(:disabled) { background: #219a52; }
#status-bar { margin-top: 12px; font-size: 12px; color: #f39c12; }
</style>
</head>
<body>
<div id="player"></div>
<div id="ui-panel">
<h3>WDP 场景信息</h3>
<div class="info-section"><div class="label">API 基线版本</div><div class="value">WDP 2.3.0 / BIM 2.2.0 / GIS 2.1.0</div></div>
<div class="info-section"><div class="label">BIM 插件版本</div><div class="value" id="info-bim-version">加载中...</div></div>
<div class="info-section"><div class="label">GIS 插件版本</div><div class="value" id="info-gis-version">加载中...</div></div>
<div class="info-section"><div class="label">坐标系信息</div><div class="value" id="info-coord-system">加载中...</div></div>
<div class="info-section"><div class="label">相机初始位置</div><div class="value" id="info-camera-pos">加载中...</div></div>
<button class="btn-action secondary" id="btn-fetch-info" disabled>手动获取空间信息</button>
<button class="btn-action" id="btn-reset-view" disabled>回到默认视角</button>
<div id="status-bar">系统状态：等待初始化...</div>
</div>
<script type="module" src="./main.js"></script>
</body>
</html>
