<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WDP 可行性测试：覆盖物与场景开关</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div id="player"></div>

    <div id="loading" class="overlay">
      <div class="panel">
        <h2>正在连接云渲染视频流</h2>
        <p id="loadingText">初始化中...</p>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-title">功能测试面板（点击即开/关）</div>
      <div class="toolbar-actions">
        <button id="focusBtn" disabled>镜头聚焦</button>
        <button id="poiBtn" disabled>POI</button>
        <button id="rangeBtn" disabled>区域轮廓</button>
        <button id="heatmapBtn" disabled>热力图</button>
        <button id="timeBtn" disabled>场景时间</button>
        <button id="seasonBtn" disabled>天气轮换</button>
        <button id="bossBtn" disabled>BOSS复位</button>
      </div>
      <span id="status">状态：未启动</span>
    </div>

    <pre id="log" class="log"></pre>
  </div>

  <script src="https://wdpapi.51aes.com/sdk/wdpApi.min.js"></script>
  <script src="https://unpkg.com/wdpapi@2.2.1/dist/wdpApi.min.js"></script>
  <script src="config/index.js"></script>
  <script src="app.js"></script>
</body>
</html>
